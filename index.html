<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>단팥이와 AR 사진 찍기</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        /* 사진 촬영 버튼 UI */
        #snap-btn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            background-color: #FFA500; /* 단팥이 치즈태비 색상 */
            color: #fff;
            border: 2px solid #fff;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 9999;
            cursor: pointer;
        }
        #snap-btn:active { background-color: #e69500; }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

    <button id="snap-btn">📸 찰칵!</button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" preserveDrawingBuffer="true">
        
        <a-assets>
            <img id="danpat-img" src="danpat_transparent.png" crossorigin="anonymous">
        </a-assets>

        <a-marker preset="hiro">
            <a-image 
                src="#danpat-img" 
                look-at="[camera]" 
                position="0 1 0" 
                width="1.5" 
                height="2.5"
                transparent="true"
                alpha-test="0.5">
            </a-image>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        document.getElementById('snap-btn').addEventListener('click', function() {
            const video = document.querySelector('video');
            const aCanvas = document.querySelector('.a-canvas');

            if (!video || !aCanvas) {
                alert("카메라가 아직 준비되지 않았습니다.");
                return;
            }

            // 합성을 위한 캔버스 생성
            const captureCanvas = document.createElement('canvas');
            captureCanvas.width = video.videoWidth;
            captureCanvas.height = video.videoHeight;
            const ctx = captureCanvas.getContext('2d');

            // 1. 현실 배경(비디오) 그리기
            ctx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);

            // 2. AR 캐릭터(WebGL 캔버스) 그리기
            // 디바이스 해상도 차이를 보정하여 중앙에 맞춤
            const arWidth = captureCanvas.width;
            const arHeight = (aCanvas.height / aCanvas.width) * captureCanvas.width;
            const offsetY = (captureCanvas.height - arHeight) / 2;
            ctx.drawImage(aCanvas, 0, offsetY, arWidth, arHeight);

            // 3. 이미지 파일로 다운로드
            const dataURI = captureCanvas.toDataURL('image/jpeg', 0.9);
            const link = document.createElement('a');
            link.download = `DanPat_AR_${new Date().getTime()}.jpg`;
            link.href = dataURI;
            link.click();
        });
    </script>
</body>
</html>
